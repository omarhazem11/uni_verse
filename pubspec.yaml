name: uni_verse
description: "Uni-Verse - Egyptian University Discovery App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.3.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Auth
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1

  # Local storage
  shared_preferences: ^2.3.2

  # Utils
  dartz: ^0.10.1
  equatable: ^2.0.5
  uuid: ^4.5.1

  # Splash
  flutter_native_splash: ^2.4.8

  # Links
  url_launcher: ^6.3.1

  # Export + version
  share_plus: ^10.0.0
  package_info_plus: ^8.0.0
  archive: ^4.0.0

  # Solar greeting
  http: ^1.2.0

  # Push notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Sound effects
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#1A1033"
  adaptive_icon_foreground: "assets/images/logo_adaptive_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/sounds/
